<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Foro Ciudadano Santo Domingo | Tu Voz en la Comuna</title>
    <meta name="description" content="Plataforma de participación ciudadana de Santo Domingo. Propón ideas, reporta incidentes y apoya las iniciativas de tus vecinos para mejorar nuestra comuna." />
    <meta name="keywords" content="Santo Domingo, Chile, municipalidad, foro ciudadano, reclamos, propuestas, comunidad, participación" />
    <meta name="author" content="Municipalidad de Santo Domingo" />
    
    <script>
      // 1. Lógica existente para el Tema (Oscuro/Claro)
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }

      // 2. NUEVA LÓGICA: Inyección inmediata del Color de Acento
      const accent = localStorage.getItem('accent') || 'blue';
      document.documentElement.classList.add(`accent-${accent}`);
    </script>
    <link href="/src/style.css" rel="stylesheet">
  </head>
  <body class="bg-bg text-txt">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
